<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROSKIX Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
height:100vh;
display:flex;
background:#0f172a;
color:white;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:300px;
background:#111827;
display:flex;
flex-direction:column;
border-right:1px solid #1f2937;
}

.profile{
padding:15px;
background:#0b1220;
text-align:center;
}

.profile h2{
font-size:16px;
margin-top:10px;
}

.users{
flex:1;
overflow-y:auto;
}

.user{
padding:12px;
cursor:pointer;
border-bottom:1px solid #1f2937;
}

.user:hover{
background:#1f2937;
}

/* CHAT AREA */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
background:#111827;
border-bottom:1px solid #1f2937;
}

.messages{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
padding:10px;
margin-bottom:10px;
border-radius:10px;
max-width:70%;
}

.me{
background:#3b82f6;
margin-left:auto;
}

.other{
background:#1f2937;
}

.system{
text-align:center;
font-size:12px;
color:#94a3b8;
margin:8px 0;
}

/* INPUT */
.input{
display:flex;
padding:10px;
background:#111827;
gap:10px;
}

.input input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:#1f2937;
color:white;
}

.input button{
padding:12px 15px;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{display:none;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="profile">
<div>💬 BROSKIX</div>
<h2 id="me"></h2>
</div>

<div id="users" class="users"></div>

</div>

<!-- CHAT -->
<div class="chat">

<div class="header" id="chatTitle">
🌍 Global Chat
</div>

<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Type message...">
<button onclick="send()">➤</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

const account = JSON.parse(localStorage.getItem("broskix_user"))

if(!account){
location.href = "/"
}

document.getElementById("me").innerText = account.username

let activeChat = "global"
let selectedUser = null

socket.emit("join", account.username)

const usersDiv = document.getElementById("users")
const messagesDiv = document.getElementById("messages")

// USERS LIST
socket.on("users", (list) => {

usersDiv.innerHTML = ""

list.forEach(u => {

if(u.username === account.username) return

const div = document.createElement("div")
div.className = "user"
div.innerText = "🟢 " + u.username

div.onclick = () => {
selectedUser = u
activeChat = "dm"
document.getElementById("chatTitle").innerText =
"DM: " + u.username
messagesDiv.innerHTML = ""
}

usersDiv.appendChild(div)

})

})

// GLOBAL MESSAGE
socket.on("message", (data) => {

if(activeChat !== "global") return

const div = document.createElement("div")

div.className =
data.user === account.username ? "msg me" : "msg other"

div.innerHTML =
`<b>${data.user}</b><br>${data.text}`

messagesDiv.appendChild(div)
messagesDiv.scrollTop = messagesDiv.scrollHeight

})

// SYSTEM
socket.on("system", (msg) => {

const div = document.createElement("div")
div.className = "system"
div.innerText = msg
messagesDiv.appendChild(div)

})

// PRIVATE MESSAGE
socket.on("privateMessage", (data) => {

if(activeChat !== "dm") return

const div = document.createElement("div")

div.className =
data.from === "You" ? "msg me" : "msg other"

div.innerHTML =
`<b>${data.from}</b><br>${data.text}`

messagesDiv.appendChild(div)
messagesDiv.scrollTop = messagesDiv.scrollHeight

})

// SEND MESSAGE
function send(){

const input = document.getElementById("msg")
const text = input.value.trim()
if(!text) return

if(activeChat === "global"){

socket.emit("message", text)

}else if(activeChat === "dm" && selectedUser){

socket.emit("privateMessage", {
to: selectedUser.id,
text
})

}

input.value = ""
}

</script>

</body>
  </html>
