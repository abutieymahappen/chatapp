<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BROSKIX CHAT</title>

<style>
body{
margin:0;
background:#0f172a;
color:white;
font-family:Arial;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#online{
text-align:center;
padding:10px;
}

#messages{
height:75vh;
overflow-y:auto;
padding:10px;
}

.msg{
background:#1e293b;
padding:10px;
margin:8px 0;
border-radius:10px;
}

form{
display:flex;
padding:10px;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
}

button{
padding:12px;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<header>BROSKIX CHAT</header>

<div id="online">Online: 0</div>

<div id="messages"></div>

<form id="form">
<input id="input" placeholder="Type message...">
<button>Send</button>
</form>

<script src="/socket.io/socket.io.js"></script>

<script>

const username =
localStorage.getItem("username")

if(!username){
location.href="/"
}

const socket = io()

socket.emit("join",username)

const form =
document.getElementById("form")

const input =
document.getElementById("input")

const messages =
document.getElementById("messages")

form.addEventListener("submit",(e)=>{

e.preventDefault()

if(input.value){

socket.emit(
"message",
input.value
)

input.value=""
}
})

socket.on("message",(data)=>{

const div =
document.createElement("div")

div.className="msg"

div.innerHTML=
`<b>${data.user}</b><br>${data.text}`

messages.appendChild(div)

messages.scrollTop =
messages.scrollHeight
})

socket.on("online",(count)=>{

document.getElementById("online")
.innerText =
`Online: ${count}`
})

</script>

</body>
  </html>
