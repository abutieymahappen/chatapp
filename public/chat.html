<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROSKIX Chat</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
height:100vh;
display:flex;
background:#0f172a;
overflow:hidden;
}

/* Sidebar */

.sidebar{
width:300px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-right:1px solid rgba(255,255,255,.08);
display:flex;
flex-direction:column;
}

.profile{
padding:20px;
background:rgba(255,255,255,.05);
text-align:center;
color:white;
}

.avatar{
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(
135deg,
#3b82f6,
#8b5cf6,
#06b6d4
);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
margin:auto;
margin-bottom:10px;
}

.users{
flex:1;
overflow-y:auto;
padding:10px;
}

.user{
padding:12px;
margin-bottom:8px;
border-radius:12px;
background:rgba(255,255,255,.05);
color:white;
}

/* Chat */

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
height:70px;
display:flex;
align-items:center;
padding:0 20px;
color:white;
font-weight:bold;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:75%;
padding:12px 16px;
border-radius:18px;
margin-bottom:15px;
word-wrap:break-word;
}

.me{
margin-left:auto;
background:linear-gradient(
90deg,
#3b82f6,
#8b5cf6
);
color:white;
}

.other{
background:rgba(255,255,255,.08);
color:white;
}

.time{
font-size:11px;
opacity:.7;
margin-top:5px;
}

.system{
text-align:center;
color:#cbd5e1;
margin:10px 0;
}

.typing{
height:25px;
padding-left:20px;
color:#94a3b8;
}

/* Input */

.input-area{
padding:15px;
display:flex;
gap:10px;
background:rgba(255,255,255,.05);
}

.input-area input{
flex:1;
padding:14px;
border:none;
outline:none;
border-radius:16px;
background:rgba(255,255,255,.08);
color:white;
}

.send{
width:55px;
border:none;
border-radius:16px;
cursor:pointer;
background:linear-gradient(
135deg,
#3b82f6,
#8b5cf6,
#06b6d4
);
color:white;
font-size:18px;
}

.logout{
margin-top:10px;
padding:10px;
border:none;
border-radius:12px;
background:#ef4444;
color:white;
cursor:pointer;
}

@media(max-width:768px){

.sidebar{
display:none;
}

}
</style></head>
<body><div class="sidebar"><div class="profile"><div class="avatar">👤</div><div id="name"></div><button class="logout" onclick="logout()">
Logout
</button></div><div class="users" id="users"></div></div><div class="chat"><div class="header">
💬 BROSKIX CHAT
</div><div id="typing" class="typing"></div><div id="messages" class="messages"></div><form id="form" class="input-area"><input
id="input"
placeholder="Write a message...">

<button class="send">
➤
</button></form></div><script src="/socket.io/socket.io.js"></script><script>

const account =
JSON.parse(
localStorage.getItem("broskix_user")
)

if(!account){
location.href="/"
}

document.getElementById("name")
.innerText = account.username

const username =
account.username

const socket = io()

socket.emit("join", username)

const messages =
document.getElementById("messages")

const users =
document.getElementById("users")

const typing =
document.getElementById("typing")

const input =
document.getElementById("input")

document
.getElementById("form")
.addEventListener("submit",(e)=>{

e.preventDefault()

if(!input.value.trim()) return

socket.emit(
"message",
input.value
)

input.value=""
})

input.addEventListener("input",()=>{

socket.emit("typing")

})

socket.on("message",(data)=>{

const div =
document.createElement("div")

div.className =
data.user === username
? "message me"
: "message other"

div.innerHTML = `
<b>${data.user}</b><br>
${data.text}
<div class="time">
${data.time}
</div>
`

messages.appendChild(div)

messages.scrollTop =
messages.scrollHeight

})

socket.on("users",(list)=>{

users.innerHTML=""

list.forEach(user=>{

users.innerHTML += `
<div class="user">
🟢 ${user}
</div>
`

})

})

socket.on("typing",(user)=>{

typing.textContent =
`${user} is typing...`

setTimeout(()=>{
typing.textContent=""
},1500)

})

socket.on("system",(msg)=>{

messages.innerHTML += `
<div class="system">
${msg}
</div>
`

})

function logout(){

localStorage.removeItem(
"broskix_user"
)

location.href="/"

}

</script></body>
  </html>
