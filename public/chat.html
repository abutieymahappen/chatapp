<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROSKIX Chat</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,sans-serif;
}

body{
height:100vh;
display:flex;
background:#0e1621;
overflow:hidden;
}

.sidebar{
width:320px;
background:#17212b;
border-right:1px solid #202b36;
display:flex;
flex-direction:column;
}

.logo{
padding:20px;
font-size:22px;
font-weight:bold;
color:white;
background:#1f2c3a;
}

.users{
flex:1;
overflow-y:auto;
}

.user{
padding:15px;
color:white;
border-bottom:1px solid #202b36;
cursor:pointer;
}

.user:hover{
background:#202b36;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
background:#0e1621;
}

.header{
padding:15px;
background:#17212b;
color:white;
font-weight:bold;
border-bottom:1px solid #202b36;
}

#typing{
height:20px;
padding-left:15px;
color:#7d8b99;
font-size:13px;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:75%;
padding:10px 14px;
margin-bottom:12px;
border-radius:12px;
word-wrap:break-word;
}

.me{
background:#2aabee;
color:white;
margin-left:auto;
}

.other{
background:#17212b;
color:white;
}

.time{
font-size:11px;
opacity:.7;
margin-top:4px;
}

.input-area{
display:flex;
padding:15px;
background:#17212b;
gap:10px;
}

.input-area input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#243447;
color:white;
}

.input-area button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#2aabee;
color:white;
cursor:pointer;
}

@media(max-width:768px){

.sidebar{
display:none;
}

}
</style></head><body><div class="sidebar">
<div class="logo">BROSKIX CHAT</div><div id="users" class="users">
</div>
</div><div class="chat"><div class="header">
Global Chat Room
</div><div id="typing"></div><div id="messages" class="messages"></div><form id="form" class="input-area"><input
id="input"
placeholder="Write a message...">

<button>
Send
</button></form></div><script src="/socket.io/socket.io.js"></script><script>

const username =
localStorage.getItem("username")

if(!username){
location.href="/"
}

const socket = io()

socket.emit("join", username)

const messages =
document.getElementById("messages")

const users =
document.getElementById("users")

const typing =
document.getElementById("typing")

const input =
document.getElementById("input")

document.getElementById("form")
.addEventListener("submit",(e)=>{

e.preventDefault()

if(!input.value.trim()) return

socket.emit(
"message",
input.value
)

input.value=""
})

input.addEventListener("input",()=>{

socket.emit("typing")

})

socket.on("message",(data)=>{

const div =
document.createElement("div")

div.className =
data.user === username
? "message me"
: "message other"

div.innerHTML = `
<b>${data.user}</b><br>
${data.text}
<div class="time">${data.time}</div>
`

messages.appendChild(div)

messages.scrollTop =
messages.scrollHeight

})

socket.on("users",(list)=>{

users.innerHTML=""

list.forEach(user=>{

users.innerHTML += `
<div class="user">
🟢 ${user}
</div>
`

})

})

socket.on("typing",(user)=>{

typing.textContent =
`${user} is typing...`

setTimeout(()=>{

typing.textContent=""

},1500)

})

socket.on("system",(msg)=>{

const div =
document.createElement("div")

div.className =
"message other"

div.innerHTML =
`📢 ${msg}`

messages.appendChild(div)

})

</script></body>
</html>
