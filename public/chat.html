<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROSKIX Telegram</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

body{
height:100vh;
display:flex;
background:#0b1220;
color:white;
}

/* LEFT SIDE */
.left{
width:300px;
background:#111827;
display:flex;
flex-direction:column;
border-right:1px solid #1f2937;
}

.header{
padding:12px;
text-align:center;
font-weight:bold;
background:#0b1220;
}

.tabs{
display:flex;
}

.tab{
flex:1;
padding:10px;
text-align:center;
cursor:pointer;
background:#0f172a;
border-bottom:2px solid transparent;
}

.tab.active{
border-bottom:2px solid #3b82f6;
}

.list{
flex:1;
overflow:auto;
}

.item{
padding:12px;
cursor:pointer;
border-bottom:1px solid #1f2937;
}

.item:hover{
background:#1f2937;
}

/* RIGHT SIDE */
.right{
flex:1;
display:flex;
flex-direction:column;
}

.top{
padding:14px;
background:#111827;
border-bottom:1px solid #1f2937;
font-weight:bold;
}

.messages{
flex:1;
padding:15px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:70%;
padding:10px 14px;
border-radius:12px;
}

.me{
align-self:flex-end;
background:#3b82f6;
}

.other{
align-self:flex-start;
background:#1f2937;
}

/* INPUT */
.input{
display:flex;
padding:10px;
background:#111827;
gap:10px;
}

.input input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:10px;
background:#1f2937;
color:white;
}

.input button{
padding:12px 14px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="left">

<div class="header">💬 BROSKIX CHAT</div>

<div class="tabs">
<div class="tab active" onclick="openTab('global')">🌍 Global</div>
<div class="tab" onclick="openTab('dm')">💬 DMs</div>
</div>

<div id="list" class="list"></div>

</div>

<div class="right">

<div class="top" id="title">🌍 Global Chat</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Message...">
<button onclick="send()">➤</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

const me = JSON.parse(localStorage.getItem("broskix_user"))
if(!me) location.href="/"

socket.emit("join", me)

let mode = "global"
let selectedUser = null

const list = document.getElementById("list")
const messages = document.getElementById("messages")
const title = document.getElementById("title")

// TABS
function openTab(t){

mode = t
selectedUser = null
messages.innerHTML = ""

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

if(t === "global"){
document.querySelectorAll(".tab")[0].classList.add("active")
title.innerText = "🌍 Global Chat"
}

if(t === "dm"){
document.querySelectorAll(".tab")[1].classList.add("active")
title.innerText = "💬 Select user"
}

}

// USERS
socket.on("users", users => {

list.innerHTML = ""

users.forEach(u => {

if(u.username === me.username) return

const div = document.createElement("div")
div.className = "item"
div.innerText = "🟢 " + u.username

div.onclick = () => {

mode = "dm"
selectedUser = u
title.innerText = "DM: " + u.username
messages.innerHTML = ""

}

list.appendChild(div)

})

})

// GLOBAL MSG
socket.on("message", data => {

if(mode !== "global") return

const div = document.createElement("div")

div.className =
data.user === me.username ? "msg me" : "msg other"

div.innerText = data.user + ": " + data.text

messages.appendChild(div)

messages.scrollTop = messages.scrollHeight

})

// DM MSG
socket.on("privateMessage", data => {

if(mode !== "dm") return

const div = document.createElement("div")

div.className =
data.from === "You" ? "msg me" : "msg other"

div.innerText = data.from + ": " + data.text

messages.appendChild(div)

messages.scrollTop = messages.scrollHeight

})

// SEND
function send(){

const text = document.getElementById("msg").value
if(!text) return

if(mode === "global"){

socket.emit("message", text)

}

if(mode === "dm" && selectedUser){

socket.emit("privateMessage", {
to: selectedUser.id,
text
})

}

document.getElementById("msg").value = ""

}

</script>

</body>
  </html>
