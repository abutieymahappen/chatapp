<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROSKIX CHAT</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
color:white;
}

.container{
width:90%;
max-width:400px;
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.logo{
font-size:30px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
color:#cbd5e1;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:15px;
outline:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.footer{
margin-top:15px;
font-size:13px;
color:#94a3b8;
}
</style></head><body><div class="container"><div class="logo">BROSKIX CHAT</div><div class="desc">
Connect and chat in real time.
</div><input
type="text"
id="username"
placeholder="Enter Username">

<button onclick="joinChat()">
Join Chat
</button><div class="footer">
Powered by BROSKIX
</div></div><script>
function joinChat(){

const username =
document.getElementById("username").value.trim()

if(!username){
alert("Enter a username")
return
}

localStorage.setItem(
"username",
username
)

window.location.href =
"/chat.html"
}
</script></body>
</html>
