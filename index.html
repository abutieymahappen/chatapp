<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BROSKIX LOGIN</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
background:#1e293b;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h1>BROSKIX CHAT</h1>

<input id="name" placeholder="Username">

<button onclick="login()">Join Chat</button>
</div>

<script>
function login(){

const username =
document.getElementById("name").value

if(!username){
alert("Enter username")
return
}

localStorage.setItem("username",username)

location.href="chat.html"
}
</script>

</body>
  </html>
